- name: "密码错误"
  payload:
    account: "buyer1782311275750"
    password: "1234567"
  expected_status: 401
  expected_message: "账号或密码错误"

- name: "账号不存在"
  payload:
    account: "not_exists_user"
    password: "123456"
  expected_status: 401
  expected_message: "账号或密码错误"

- name: "账号为空"
  payload:
    account: ""
    password: "123456"
  expected_status: 400
  expected_message: "请输入账号"

- name: "密码过短"
  payload:
    account: "buyer1782311275750"
    password: "123"
  expected_status: 400
  expected_message: "密码至少需要 6 个字符"
